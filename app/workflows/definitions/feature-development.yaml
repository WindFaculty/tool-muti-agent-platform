workflow_id: feature-development
version: "1.0"
description: Build a new feature from task intake to reviewed implementation.
steps:
  - id: planner
    agent: planner
    input_template: |
      Break down the requested feature into an execution plan.
    allowed_tools: []
    retry_limit: 1
    on_success: architect
    on_failure: failed
    artifacts_to_capture:
      - plan
  - id: architect
    agent: architect
    input_template: |
      Produce the architecture changes and interfaces required for the feature.
    allowed_tools:
      - read_file
      - file_reader
      - list_files
      - code_search
    retry_limit: 1
    on_success: coder
    on_failure: failed
    artifacts_to_capture:
      - architecture
  - id: coder
    agent: coder
    input_template: |
      Produce the implementation outline and workspace artifacts for the feature.
    allowed_tools:
      - read_file
      - file_reader
      - write_file
      - file_writer
      - edit_file
      - file_editor
      - list_files
      - code_search
    retry_limit: 1
    on_success: tester
    on_failure: failed
    artifacts_to_capture:
      - implementation
  - id: tester
    agent: tester
    input_template: |
      Execute or propose validation for the feature implementation.
    allowed_tools:
      - test_runner
      - shell_exec
      - terminal_runner
      - read_file
      - file_reader
    retry_limit: 1
    on_success: reviewer
    on_failure: debugger
    artifacts_to_capture:
      - test-report
  - id: debugger
    agent: debugger
    input_template: |
      Analyze failures and propose or apply the next repair.
    allowed_tools:
      - read_file
      - file_reader
      - edit_file
      - file_editor
      - write_file
      - file_writer
      - test_runner
      - shell_exec
      - terminal_runner
    retry_limit: 2
    on_success: tester
    on_failure: failed
    artifacts_to_capture:
      - debug-notes
  - id: reviewer
    agent: reviewer
    input_template: |
      Review the current implementation, architecture, and test evidence.
    allowed_tools:
      - read_file
      - file_reader
      - list_files
      - code_search
      - test_runner
    retry_limit: 1
    on_success: completed
    on_failure: coder
    artifacts_to_capture:
      - review
