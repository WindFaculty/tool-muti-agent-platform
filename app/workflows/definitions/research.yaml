workflow_id: research
version: "1.0"
description: Produce research artifacts and indexed knowledge without changing project code.
steps:
  - id: planner
    agent: planner
    input_template: |
      Scope the research question and success criteria.
    allowed_tools: []
    retry_limit: 1
    on_success: architect
    on_failure: failed
    artifacts_to_capture:
      - plan
  - id: architect
    agent: architect
    input_template: |
      Organize the research directions, references, and output structure.
    allowed_tools:
      - read_file
      - file_reader
      - web_search
      - fetch_page
      - scraper
    retry_limit: 1
    on_success: reviewer
    on_failure: failed
    artifacts_to_capture:
      - research
  - id: reviewer
    agent: reviewer
    input_template: |
      Review the research output for completeness and evidence quality.
    allowed_tools:
      - read_file
      - file_reader
      - web_search
      - fetch_page
      - scraper
    retry_limit: 1
    on_success: completed
    on_failure: architect
    artifacts_to_capture:
      - review
