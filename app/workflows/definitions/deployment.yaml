workflow_id: deployment
version: "1.0"
description: Prepare and validate a local deployment package.
steps:
  - id: planner
    agent: planner
    input_template: |
      Outline the deployment steps and prerequisites.
    allowed_tools: []
    retry_limit: 1
    on_success: devops
    on_failure: failed
    artifacts_to_capture:
      - deployment-plan
  - id: devops
    agent: devops
    input_template: |
      Produce local deployment outputs and commands.
    allowed_tools:
      - docker_build
      - docker_runner
      - git_commit
      - git_push
      - read_file
      - file_reader
    retry_limit: 1
    on_success: reviewer
    on_failure: failed
    artifacts_to_capture:
      - deployment
  - id: reviewer
    agent: reviewer
    input_template: |
      Review deployment readiness and evidence.
    allowed_tools:
      - read_file
      - file_reader
      - list_files
      - code_search
    retry_limit: 1
    on_success: completed
    on_failure: devops
    artifacts_to_capture:
      - review
