dangerous_tokens:
  - "rm -rf"
  - "del /f /s /q"
  - "format c:"
  - "shutdown"
  - "reboot"
  - "invoke-expression"
  - "powershell -enc"
  - "set-executionpolicy"
  - "net user"
  - "chmod 777 /"

agents:
  default:
    allow_tools:
      - "*"
    deny_tools: []
    path_roots:
      - "."
      - "output"
      - "agent-platform\\tmp"
    network_allowlist:
      - "serpapi.com"
      - "www.google.com"
      - "google.com"
      - "*"
    command_allowlist:
      "*":
        - "python"
        - "pip"
        - "pytest"
        - "flake8"
        - "isort"
        - "ruff"
        - "black"
        - "git"
        - "docker"
        - "npm"
        - "mvn"
        - "uvicorn"
        - "node"
        - "powershell"
        - "rg"
      shell_exec:
        - "python"
        - "pip"
        - "pytest"
        - "flake8"
        - "isort"
        - "ruff"
        - "git"
        - "docker"
        - "npm"
        - "mvn"
        - "uvicorn"
        - "rg"
      run_code:
        - "python"
        - "powershell"
        - "node"
      test_runner:
        - "pytest"
        - "mvn"
        - "npm"
      linter:
        - "flake8"
        - "ruff"
        - "pylint"
      formatter:
        - "isort"
        - "black"
        - "ruff"
      git_commit:
        - "git"
      install_dependency:
        - "python"
        - "npm"
        - "mvn"
      run_server:
        - "python"
        - "uvicorn"
        - "mvn"
        - "npm"
      docker_build:
        - "docker"
