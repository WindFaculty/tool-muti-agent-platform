defaults:
  max_tool_calls: 3
  max_step_retries: 1
  allowed_tools: []
agents:
  planner:
    prompt: planner_prompt.md
    max_tool_calls: 1
    allowed_tools:
      - read_file
      - file_reader
      - list_files
      - code_search
      - web_search
  architect:
    prompt: architect_prompt.md
    max_tool_calls: 2
    allowed_tools:
      - read_file
      - file_reader
      - list_files
      - code_search
  coder:
    prompt: coder_prompt.md
    max_tool_calls: 3
    allowed_tools:
      - read_file
      - file_reader
      - write_file
      - file_writer
      - edit_file
      - file_editor
      - list_files
      - code_search
      - formatter
  tester:
    prompt: test_prompt.md
    max_tool_calls: 2
    allowed_tools:
      - test_runner
      - terminal_runner
      - shell_exec
      - read_file
      - file_reader
  debugger:
    prompt: debug_prompt.md
    max_tool_calls: 3
    allowed_tools:
      - read_file
      - file_reader
      - edit_file
      - file_editor
      - write_file
      - file_writer
      - test_runner
      - terminal_runner
      - shell_exec
  reviewer:
    prompt: review_prompt.md
    max_tool_calls: 2
    allowed_tools:
      - read_file
      - file_reader
      - list_files
      - code_search
      - test_runner
  devops:
    prompt: devops_prompt.md
    max_tool_calls: 3
    allowed_tools:
      - docker_build
      - docker_runner
      - git_commit
      - git_push
      - read_file
      - file_reader
